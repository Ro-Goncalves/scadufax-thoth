services:
  api01:
    build: .
    cpuset: "0"
    environment:
      - PORT=8080
      - DATA_DIR=/data
      - NPROBE=${NPROBE:-6}
      - K_NEIGHBORS=${K_NEIGHBORS:-5}
      - FRAUD_THRESHOLD=${FRAUD_THRESHOLD:-0.6}
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: '165MB'

  api02:
    build: .
    cpuset: "1"
    environment:
      - PORT=8080
      - DATA_DIR=/data
      - NPROBE=${NPROBE:-6}
      - K_NEIGHBORS=${K_NEIGHBORS:-5}
      - FRAUD_THRESHOLD=${FRAUD_THRESHOLD:-0.6}
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: '165MB'

  lb:
    image: haproxy:lts-alpine
    cpuset: "2"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '20MB'