services:
  api01:
    build: .
    environment:
      - PORT=8080
      - DATASET_PATH=/app/dataset.bin
    volumes:
      - ./dataset.bin:/app/dataset.bin:ro # Monta como Read-Only
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: '165MB'

  api02:
    build: .
    environment:
      - PORT=8080
      - DATASET_PATH=/app/dataset.bin
    volumes:
      - ./dataset.bin:/app/dataset.bin:ro
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: '165MB'

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '20MB'